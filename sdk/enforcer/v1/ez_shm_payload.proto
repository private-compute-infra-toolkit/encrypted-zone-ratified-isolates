syntax = "proto3";

package enforcer.v1;

// ShmSlabPool - shared memory allocator
// Utilize ShmSlabPool for transferring large RPC payloads
// between the enforcer and the isolate. ShmSlotReference will
// tell the receiving end where to find the RPC payload
// TODO: b/498252442 - Link to ShmSlabPool impl when available.
// For context see: go/ez-ipc-optimization.
message ShmSlotReference {
  // The index of the slot in the shared memory slab pool.
  int64 slot_index = 1;
  // The length of the payload data in bytes.
  int64 length = 2;
}

// Multiple slots to be read and freed.
message ShmSlotData {
  // The collection of slot references.
  repeated ShmSlotReference slots = 1;
}
