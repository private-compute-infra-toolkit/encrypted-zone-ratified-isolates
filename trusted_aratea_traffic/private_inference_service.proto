syntax = "proto3";

package private_inference_service;

service PrivateInferenceService {
  rpc GenerateContent(GenerateContentRequest)
      returns (GenerateContentResponse) {}
}

message GenerateContentRequest {
  int32 opaque_field_1 = 1;
  bytes opaque_field_2 = 2;
}

message GenerateContentResponse {
  bytes opaque_field_1 = 1;
}
